name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
  merge_group:
    types:
      - checks_requested
  schedule:
    - cron: 0 15 * * *
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          github_token: ${{ github.token }}
          cache: true
      - name: Setup
        run: mise setup
      - run: mise run build

  lint:
    name: Lint
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          github_token: ${{ github.token }}
          cache: true
      - name: Setup
        run: mise setup
      - run: mise run lint
